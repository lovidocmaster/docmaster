<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — iLoveDoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo"><span class="logo-emoji" aria-hidden="true">&#10084;&#65039;</span> iLove <span>Doc</span></a>
    <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <nav class="nav" aria-label="Main">
      <a href="index.html">Tools</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Log in</a>
      <a href="signup.html" class="btn-nav">Sign up</a>
    </nav>
  </header>

  <main class="wrap auth-layout">
    <div class="tool-page-header">
      <h1>Create your account</h1>
      <p>Start using iLoveDoc tools. Demo signup saves your email locally only.</p>
    </div>
    <div class="card-panel">
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="name">Display name</label>
          <input type="text" id="name" name="name" autocomplete="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="check-row" style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer">
            <input type="checkbox" id="terms" name="terms" required style="width: auto; margin-top: 0.25rem" />
            <span>I agree to the terms (demo).</span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>
      <p style="margin-top: 1rem; margin-bottom: 0; font-size: 0.9rem">
        Already have an account? <a href="login.html">Log in</a>
      </p>
      <div id="signup-msg" class="status-msg" style="display: none; margin-top: 1rem"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p class="footer-brand">❤️ iLoveDoc</p>
    <p>Made with ❤️ for the World</p>
    <p class="footer-links">
      <a href="about.html">About</a>
      <a href="pricing.html">Pricing</a>
      <a href="blog.html">Blog</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="contact.html">Contact</a>
    </p>
    <p>© 2026 iLoveDoc. All rights reserved.</p>
  </footer>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
