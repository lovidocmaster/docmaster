<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Split PDF — DocMaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">Doc<span>Master</span></a>
    <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <nav class="nav" aria-label="Main">
      <a href="index.html">Tools</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Log in</a>
      <a href="signup.html" class="btn-nav">Sign up</a>
    </nav>
  </header>

  <main class="wrap">
    <div class="tool-page-header">
      <p><a href="index.html">← All tools</a></p>
      <h1>Split PDF</h1>
      <p>Extract one page range into a new PDF, or split every page into separate files.</p>
    </div>
    <div class="tool-workspace">
      <div class="form-group">
        <label for="file">PDF file</label>
        <input type="file" id="file" accept="application/pdf,.pdf" />
      </div>
      <div class="form-group">
        <label>Mode</label>
        <select id="mode">
          <option value="range">Page range</option>
          <option value="each">Each page as its own PDF</option>
        </select>
      </div>
      <div id="range-fields" class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem">
        <div>
          <label for="from">From page</label>
          <input type="number" id="from" min="1" value="1" />
        </div>
        <div>
          <label for="to">To page</label>
          <input type="number" id="to" min="1" value="1" />
        </div>
      </div>
      <p id="page-info" class="hint"></p>
      <div class="btn-row">
        <button type="button" id="split-btn" class="btn btn-primary" disabled>Split &amp; download</button>
      </div>
      <div id="status" class="status-msg info" style="display: none"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© DocMaster. <a href="index.html">Home</a></p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pdf-split.js"></script>
</body>
</html>
