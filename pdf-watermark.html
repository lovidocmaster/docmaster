  <link rel="stylesheet" href="css/styles.css" />

<body>
  <header class="site-header">
    <a href="index.html" class="logo">iLove<span>Doc</span></a>
    <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>

    <nav class="nav" aria-label="Main">
      <a href="index.html">Tools</a>

      <a href="signup.html" class="btn-nav">Sign up</a>
    </nav>
  </header>

  <main class="wrap">
    <div class="tool-page-header">
      <p><a href="index.html">← All tools</a></p>
      <h1>Watermark PDF</h1>
      <p>Add diagonal text across every page. Works best on non-encrypted PDFs.</p>
    </div>
    <div class="tool-workspace">
      <div class="form-group">
        <label for="file">PDF file</label>
        <input type="file" id="file" accept="application/pdf,.pdf" />
      </div>
      <div class="form-group">
        <label for="text">Watermark text</label>
        <input type="text" id="text" placeholder="CONFIDENTIAL" value="CONFIDENTIAL" />
      </div>
      <div class="form-group">
        <label for="opacity">Opacity</label>
        <input type="range" id="opacity" min="0.1" max="0.6" step="0.05" value="0.25" style="width: 100%" />
        <p class="hint" id="opacity-label">25%</p>
      </div>
      <div class="btn-row">
        <button type="button" id="go-btn" class="btn btn-primary" disabled>Apply &amp; download</button>
      </div>
      <div id="status" class="status-msg info" style="display: none"></div>
    </div>
  </main>
